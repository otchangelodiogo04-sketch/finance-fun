<!DOCTYPE html>
<html lang="pt-pt" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance - Login Real</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        accent: '#a855f7',
                        background: '#09090b',
                        foreground: '#fafafa',
                        card: '#18181b',
                        border: '#27272a',
                        muted: {
                            DEFAULT: '#27272a',
                            foreground: '#a1a1aa'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; }
        .text-gradient { background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .btn-gradient { background: linear-gradient(to right, #6366f1, #a855f7); transition: all 0.3s ease; }
        .btn-gradient:hover { opacity: 0.9; transform: translateY(-1px); }
        .fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Notificação Simples */
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; display: none; z-index: 100; font-weight: 500; }
        .toast-error { background: #ef4444; color: white; }
        .toast-success { background: #10b981; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative">

    <div id="toast"></div>

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-[600px] h-[400px] bg-indigo-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-purple-500/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md relative z-10 fade-up py-8">
        <div class="flex flex-col items-center mb-8">
            <div class="w-20 h-20 mb-4 bg-zinc-900 rounded-2xl flex items-center justify-center border border-zinc-800">
                <i data-lucide="layout-dashboard" class="w-10 h-10 text-indigo-500"></i>
            </div>
            <h1 class="text-4xl font-bold text-gradient">Finance</h1>
            <p class="text-zinc-400 mt-2 text-center">Entre na sua conta para gerir os seus ativos</p>
        </div>

        <form id="loginForm" class="glass rounded-3xl p-6 md:p-8 space-y-6">
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium text-zinc-300 ml-1">Endereço de Email</label>
                <div class="relative group">
                    <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500"></i>
                    <input type="email" id="email" placeholder="nome@exemplo.com" required
                        class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label for="password" class="text-sm font-medium text-zinc-300 ml-1">Palavra-passe</label>
                <div class="relative group">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500"></i>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl py-3 pl-10 pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-indigo-400 p-1">
                        <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between px-1 text-sm">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" id="rememberMe" class="accent-indigo-500">
                    <span class="text-zinc-400 group-hover:text-zinc-300">Manter sessão</span>
                </label>
                <a href="#" onclick="showToast('Verifique o seu email para recuperar.', 'error')" class="text-indigo-400 hover:text-indigo-300 font-medium">Esqueceu a senha?</a>
            </div>

            <button type="submit" id="submitBtn" class="w-full btn-gradient py-3.5 rounded-xl font-bold text-white shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2 mt-2">
                <span id="btnText">Entrar na Conta</span>
            </button>

            <div class="relative py-2 text-center">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-zinc-800"></div></div>
                <div class="relative inline-block bg-[#1c1c1f] px-4 text-xs uppercase tracking-widest text-zinc-500">ou</div>
            </div>

            <button type="button" onclick="handleGoogleSignIn()" class="w-full bg-zinc-900 border border-zinc-800 hover:bg-zinc-800 py-3 rounded-xl font-medium flex items-center justify-center gap-3 transition-all">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4" />
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                </svg>
                Google
            </button>
        </form>

        <p class="text-center mt-8 text-zinc-500">
            Ainda não tem uma conta? 
            <a href="#" onclick="handleSignUp()" class="text-indigo-400 font-semibold hover:text-indigo-300 ml-1">Registe-se aqui</a>
        </p>
    </div>

    <script>
        // 1. CONFIGURAÇÃO SUPABASE (Substitua pelos seus dados!)
        const SUPABASE_URL = "SUA_URL_AQUI";
        const SUPABASE_KEY = "SUA_KEY_AQUI";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        lucide.createIcons();

        // Alternar visibilidade da senha
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // Função para mostrar notificações (Toast)
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = type === 'error' ? 'toast-error' : 'toast-success';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // 2. LOGIN REAL
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            setLoading(true);

            // Chamada ao Supabase
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                showToast("Erro: " + error.message, "error");
                setLoading(false);
            } else {
                showToast("Sucesso! Redirecionando...", "success");
                setTimeout(() => window.location.href = '/dashboard.html', 1500);
            }
        });

        // 3. REGISTO REAL (Simples para demonstração)
        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                showToast("Preencha email e senha para registar!", "error");
                return;
            }

            setLoading(true);
            const { error } = await supabase.auth.signUp({ email, password });

            if (error) {
                showToast(error.message, "error");
            } else {
                showToast("Conta criada! Verifique o seu email para confirmar.", "success");
            }
            setLoading(false);
        }

        // 4. GOOGLE LOGIN REAL
        async function handleGoogleSignIn() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
            });
            if (error) showToast(error.message, "error");
        }

        function setLoading(isLoading) {
            const btnText = document.getElementById('btnText');
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.innerHTML = `<i data-lucide="loader-2" class="animate-spin"></i> A processar...`;
            } else {
                submitBtn.disabled = false;
                btnText.innerHTML = "Entrar na Conta";
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
